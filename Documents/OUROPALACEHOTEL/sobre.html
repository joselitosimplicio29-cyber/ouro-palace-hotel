<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Conheça a história do Ouro Palace Hotel em Ourolândia, Bahia."
    />
    <title>Nossa História | Ouro Palace Hotel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Ouro Palace Hotel">
        <img src="assets/originais/LOGOMARCA.png" alt="Ouro Palace Hotel" style="height: 60px; width: auto;" />
      </a>

      <input class="nav-toggle" type="checkbox" id="nav-toggle" aria-label="Abrir menu" />
      <label class="hamburger" for="nav-toggle" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <nav class="main-nav" aria-label="Menu principal">
        <a href="index.html#inicio">Inicio</a>
        <a href="index.html#quartos">Quartos</a>
        <a class="active" href="index.html#sobre">Sobre</a>
        <a href="index.html#servicos">Serviços</a>
        <a href="index.html#contato">Contato</a>
        <a href="index.html#fotos">Fotos</a>
        <a href="index.html#reservas">Reservas</a>
      </nav>

      <a class="header-cta" href="https://wa.me/5574988562873?text=Olá,%20Ouro%20Palace%20Hotel!%20Gostaria%20de%20fazer%20uma%20reserva.">
        Reserve agora
      </a>
    </header>

    <main>
      <section class="about-page">
        <img class="about-watermark" src="assets/originais/LOGOMARCA.png" alt="" aria-hidden="true" />
        <div class="about-content">
          <p class="eyebrow">Sobre</p>
          <h1>Nossa História</h1>
          <div id="about-text"></div>
          <div class="service-list" id="about-highlights"></div>
          <div class="photo-grid" id="about-gallery"></div>
          <a class="primary-button" href="index.html#reservas">Faça sua reserva <span>→</span></a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 Ouro Palace Hotel - Ourolandia, Bahia</p>
      <a href="https://wa.me/5574988562873?text=Olá,%20Ouro%20Palace%20Hotel!%20Gostaria%20de%20solicitar%20uma%20reserva.">WhatsApp</a>
    </footer>

    <script>
      fetch("/api/content")
        .then((response) => response.json())
        .then((data) => {
          const about = data.about || {};

          document.getElementById("about-text").innerHTML = (about.paragraphs || [])
            .map((paragraph) => `<p>${paragraph}</p>`)
            .join("");

          document.getElementById("about-highlights").innerHTML = (about.highlights || [])
            .map((item) => `<span>${item}</span>`)
            .join("");

          document.getElementById("about-gallery").innerHTML = (about.gallery || [])
            .map((url) => `<img src="${url}" alt="Foto do Ouro Palace Hotel" />`)
            .join("");
        })
        .catch(() => {
          document.getElementById("about-text").innerHTML =
            "<p>Não foi possível carregar o conteúdo agora.</p>";
        });
    </script>
  </body>
</html>
