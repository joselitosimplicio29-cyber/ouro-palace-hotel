<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo | Ouro Palace Hotel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="admin-login-screen">
      <form class="admin-login-card" id="login-form">
        <img src="../assets/originais/LOGOMARCA.png" alt="Ouro Palace Hotel" class="admin-login-logo" />
        <h1>Painel Administrativo</h1>
        <p class="admin-login-subtitle">Entre para editar quartos, fotos e textos do site</p>
        <label>
          Senha
          <input type="password" name="password" placeholder="Digite a senha" required autofocus />
        </label>
        <p class="admin-error" id="login-error" hidden></p>
        <button type="submit">Entrar</button>
      </form>
    </div>

    <script>
      const form = document.getElementById("login-form");
      const errorEl = document.getElementById("login-error");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.hidden = true;

        const password = new FormData(form).get("password");
        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password }),
          });

          if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            errorEl.textContent = body.error || "Não foi possível entrar.";
            errorEl.hidden = false;
            return;
          }

          window.location.href = "index.html";
        } catch {
          errorEl.textContent = "Erro de conexão. Tente novamente.";
          errorEl.hidden = false;
        }
      });
    </script>
  </body>
</html>
